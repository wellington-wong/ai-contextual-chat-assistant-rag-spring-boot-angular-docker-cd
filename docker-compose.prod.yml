services:
  backend:
    image: ghcr.io/wellington-wong/rag-assistant-backend:latest

    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - db

    ports:

      - "8080:8080"

  db:
    image: pgvector/pgvector:pg16

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: