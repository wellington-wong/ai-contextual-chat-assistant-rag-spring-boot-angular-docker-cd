name: Deploy Backend

on:

  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: production-deploy

  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rag-assistant-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx

        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}


      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:

          context: ./backend
          file: ./backend/Dockerfile
          push: true

          tags: |

            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha

          cache-to: type=gha,mode=max

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} <<EOF

          set -euo pipefail
          cd ~/apps/rag-assistant
          cat > .env <<EOT

          SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ragdb
          SPRING_DATASOURCE_USERNAME=postgres
          SPRING_DATASOURCE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

          VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

          POSTGRES_DB=ragdb
          EOT

          docker compose -f docker-compose.prod.yml pull backend

          docker compose -f docker-compose.prod.yml up -d backend

          echo "Waiting for backend..."

          for i in {1..30}; do

            if curl -fs http://localhost:8080/actuator/health >/dev/null; then
              echo "Backend is healthy"
              docker image prune -f

              exit 0
            fi

            sleep 2
          done

          echo "Health check failed"

          docker compose -f docker-compose.prod.yml logs backend
          exit 1          
          EOF

          echo "ssh exit code: $?"